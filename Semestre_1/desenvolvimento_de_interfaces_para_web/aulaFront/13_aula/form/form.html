<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulários</title>
    <link rel="stylesheet" href="./style/style.css">
</head>
<body>

    <style>
        input, select {
            display: block;
        }

    </style>

    <h1>Começando com os Formulários HTML</h1>
    <!-- Os formulários são a unica forma de entrada de dados do usuário no teu sistema do html -->

    <!-- method = GET / POST -->
    <form method="post" action="#">
        <label for="nome">Digite o seu nome:</label>
        <input type="text" name="nome" placeholder="nome" minlength="5" maxlength="7">

        <label for="email">Digite o seu email:</label>
        <input type="email" name="email" placeholder="email" required>

        <label for="sehna">Digite a senha:</label>
        <input type="senha" name="senha" placeholder="senha" required>

        <label for="selection">Identidade de Gênero:</label>
        <select name="selection" id="selection">
            <option value="Macho">Macho</option>
            <option value="Femea">Fêmea</option>
        <input type="checkbox">
        <button type="submit" name="enviar" value="Cadastrar">Submit</button>
        <button type="reset">Reset</button>
    </form>
    
</body>
</html>
